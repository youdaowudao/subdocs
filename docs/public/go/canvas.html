<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>打开无线画布</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f6f8fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(520px, 100%);
      text-align: center;
    }

    .url {
      margin: 0 0 24px;
      padding: 16px 18px;
      border: 1px solid #d8e0ec;
      border-radius: 8px;
      background: #fff;
      font-size: 18px;
      line-height: 1.5;
      word-break: break-all;
      user-select: all;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 180px;
      min-height: 48px;
      padding: 0 24px;
      border-radius: 8px;
      background: #2563eb;
      color: #fff;
      font-size: 17px;
      font-weight: 650;
      text-decoration: none;
      box-shadow: 0 10px 24px rgba(37, 99, 235, 0.24);
      transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
    }

    .button:hover {
      background: #1d4ed8;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }

    .button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.32);
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <p class="url">请直接复制网址：https://canvas.usegoodai.com</p>
    <a class="button" href="https://canvas.usegoodai.com" target="_blank" rel="noopener noreferrer">打开无线画布</a>
  </main>
</body>
</html>
